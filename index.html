<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Multi-Employee Wage Calculator</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="container">
    <h1>Employee Wages Data</h1>

    <form id="employeeForm">
        <div class="form-group">
            <label for="employeeName">Employee Name</label>
            <input type="text" id="employeeName" placeholder="Enter employee name" required>
        </div>

        <div class="form-group">
            <label for="hoursWorked">Hours Worked</label>
            <input type="number" id="hoursWorked" placeholder="Enter hours worked" min="0" step="0.1" required>
        </div>

        <div class="form-group">
            <label for="hourlyRate">Hourly Rate ($)</label>
            <input type="number" id="hourlyRate" placeholder="Enter hourly rate" min="0" step="0.01" required>
        </div>

        <div class="form-group">
            <label for="taxPercent">Tax (%)</label>
            <input type="number" id="taxPercent" value="10" min="0" step="0.1">
        </div>

        <div class="form-group">
            <label for="overtimeRate">Overtime Rate Multiplier</label>
            <input type="number" id="overtimeRate" value="1.5" min="1" step="0.1">
        </div>

        <button type="submit" class="btn">Add Employee</button>
    </form>

    <h2>Employee Payroll Table</h2>
    <table id="payrollTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Hours</th>
                <th>Rate ($)</th>
                <th>Normal Pay ($)</th>
                <th>Overtime ($)</th>
                <th>Gross Pay ($)</th>
                <th>Tax ($)</th>
                <th>Net Pay ($)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button id="printPayroll" class="btn">Print Payroll</button>
</div>

<script src="script.js"></script>
</body>
</html>
